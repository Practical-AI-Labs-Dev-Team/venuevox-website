document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Inter Tight';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"de116616-c81b-48ba-9a0c-7a09c8246a13\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter Tight';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"f593a672-a545-4c17-9550-bfc5994e9786\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root{\n  --navy:#0F1B2D;\n  --navy-2:#0B1422;\n  --graphite:#2A3340;\n  --teal:#19B3A6;\n  --teal-soft:rgba(25,179,166,.12);\n  --brass:#C79A4B;\n  --stone:#EEE9E1;\n  --stone-2:#F6F2EB;\n  --emerald:#10B981;\n  --coral:#EF4444;\n  --line:rgba(238,233,225,.10);\n  --line-2:rgba(238,233,225,.18);\n  --ink:#EEE9E1;\n  --ink-mute:rgba(238,233,225,.68);\n  --ink-dim:rgba(238,233,225,.48);\n\n  --f-display:\"Inter Tight\", ui-sans-serif, system-ui, sans-serif;\n  --f-sans:\"Inter\", ui-sans-serif, system-ui, sans-serif;\n  --f-num:\"IBM Plex Sans\", ui-sans-serif, system-ui, sans-serif;\n  --f-mono:\"IBM Plex Mono\", ui-monospace, monospace;\n}\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0}\nbody{\n  font-family:var(--f-sans);\n  color:var(--ink);\n  background:var(--navy);\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n  font-size:16px;\n  line-height:1.55;\n}\nh1,h2,h3,h4{font-family:var(--f-display); letter-spacing:-.02em; margin:0; font-weight:600;}\nh1{letter-spacing:-.035em; font-weight:700}\na{color:inherit; text-decoration:none}\nbutton{font-family:inherit}\n.num{font-family:var(--f-num); font-variant-numeric:tabular-nums}\n.mono{font-family:var(--f-mono)}\n.container{max-width:1280px; margin:0 auto; padding:0 32px}\n.eyebrow{\n  font-family:var(--f-mono); font-size:11px; text-transform:uppercase;\n  letter-spacing:.18em; color:var(--teal);\n  display:inline-flex; align-items:center; gap:10px;\n}\n.eyebrow::before{content:\"\"; width:18px; height:1px; background:var(--teal); display:inline-block}\n\n/* ===================== NAV ===================== */\n.nav{\n  position:sticky; top:0; z-index:40;\n  background:rgba(15,27,45,.75);\n  backdrop-filter:saturate(140%) blur(14px);\n  border-bottom:1px solid var(--line);\n}\n.nav-inner{display:flex; align-items:center; justify-content:space-between; height:68px}\n.brand{display:flex; align-items:center; gap:10px; font-family:var(--f-display); font-weight:700; letter-spacing:-.02em; font-size:18px}\n.brand .mark{\n  width:26px; height:26px; position:relative;\n  display:inline-flex; align-items:center; justify-content:center;\n}\n.brand .mark svg{display:block}\n.nav ul{list-style:none; display:flex; gap:28px; padding:0; margin:0; font-size:14px; color:var(--ink-mute)}\n.nav ul a:hover{color:var(--ink)}\n.nav-cta{display:flex; align-items:center; gap:10px}\n\n/* ===================== BUTTONS ===================== */\n.btn{\n  display:inline-flex; align-items:center; gap:10px;\n  height:44px; padding:0 18px; border-radius:8px;\n  font-size:14px; font-weight:600; letter-spacing:-.005em;\n  border:1px solid transparent; cursor:pointer;\n  transition:transform .15s ease, background .2s ease, border-color .2s ease, color .2s ease;\n}\n.btn:hover{transform:translateY(-1px)}\n.btn-primary{background:var(--teal); color:#042723;}\n.btn-primary:hover{background:#22c8ba}\n.btn-ghost{background:transparent; color:var(--ink); border-color:var(--line-2)}\n.btn-ghost:hover{border-color:var(--ink); background:rgba(238,233,225,.04)}\n.btn-dark{background:var(--navy); color:var(--ink)}\n.btn-sm{height:36px; padding:0 14px; font-size:13px}\n.btn .arrow{display:inline-block; transition:transform .2s}\n.btn:hover .arrow{transform:translateX(2px)}\n\n/* ===================== HERO ===================== */\n.hero{\n  position:relative;\n  padding:80px 0 64px;\n  overflow:hidden;\n  border-bottom:1px solid var(--line);\n  background:\n    radial-gradient(1100px 500px at 85% -10%, rgba(25,179,166,.12), transparent 60%),\n    radial-gradient(700px 400px at 10% 100%, rgba(199,154,75,.06), transparent 70%),\n    linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);\n}\n.hero::before{\n  /* architectural grid lines */\n  content:\"\"; position:absolute; inset:0; pointer-events:none;\n  background-image:\n    linear-gradient(to right, rgba(238,233,225,.04) 1px, transparent 1px),\n    linear-gradient(to bottom, rgba(238,233,225,.04) 1px, transparent 1px);\n  background-size:80px 80px;\n  mask-image:linear-gradient(180deg, rgba(0,0,0,.6), rgba(0,0,0,0) 85%);\n}\n.hero-grid{\n  display:grid; grid-template-columns: 1.05fr .95fr; gap:64px; align-items:center;\n  position:relative;\n}\n.hero h1{\n  font-size:clamp(44px, 5.2vw, 76px); line-height:1.02;\n  margin:18px 0 20px;\n}\n.hero h1 em{\n  font-style:normal; color:var(--teal);\n  background:linear-gradient(180deg, #2fd7c7, #19B3A6);\n  -webkit-background-clip:text; background-clip:text; color:transparent;\n}\n.hero p.sub{\n  font-size:19px; line-height:1.55; color:var(--ink-mute); max-width:560px;\n}\n.hero .cta-row{display:flex; gap:12px; margin-top:28px; flex-wrap:wrap}\n.hero .meta{\n  display:flex; gap:28px; margin-top:36px; padding-top:24px;\n  border-top:1px solid var(--line);\n  color:var(--ink-dim); font-size:13px;\n}\n.hero .meta strong{color:var(--ink); font-family:var(--f-num); font-weight:600; font-size:18px; display:block}\n\n/* ===================== HERO VISUAL: Revenue Console ===================== */\n.console{\n  position:relative;\n  border:1px solid var(--line-2);\n  border-radius:16px;\n  background:\n    linear-gradient(180deg, rgba(238,233,225,.025), rgba(238,233,225,.01));\n  padding:22px;\n  box-shadow:\n    0 1px 0 rgba(255,255,255,.04) inset,\n    0 40px 80px -30px rgba(0,0,0,.6),\n    0 0 0 1px rgba(25,179,166,.05);\n}\n.console-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px}\n.console-head .title{display:flex; align-items:center; gap:10px; font-size:13px; color:var(--ink-mute)}\n.pulse{\n  width:8px; height:8px; border-radius:50%; background:var(--teal);\n  box-shadow:0 0 0 0 rgba(25,179,166,.6);\n  animation:pulse 2s infinite;\n}\n@keyframes pulse{\n  0%{box-shadow:0 0 0 0 rgba(25,179,166,.5)}\n  70%{box-shadow:0 0 0 10px rgba(25,179,166,0)}\n  100%{box-shadow:0 0 0 0 rgba(25,179,166,0)}\n}\n.console-stats{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px}\n.stat{\n  border:1px solid var(--line); border-radius:10px; padding:14px;\n  background:rgba(238,233,225,.02);\n}\n.stat .label{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:8px; font-family:var(--f-mono)}\n.stat .value{font-family:var(--f-num); font-size:24px; font-weight:600; letter-spacing:-.01em}\n.stat .delta{font-size:12px; color:var(--emerald); margin-top:4px; font-family:var(--f-num)}\n.stat.revenue .value{color:var(--emerald)}\n.stat.promo .value{color:var(--teal)}\n\n.console-call{\n  border:1px solid var(--line-2); border-radius:10px; padding:14px 16px;\n  background:rgba(15,27,45,.5);\n  display:grid; grid-template-columns:auto 1fr auto; gap:14px; align-items:center;\n}\n.avatar{\n  width:36px;height:36px;border-radius:50%; background:linear-gradient(135deg,var(--teal),#0d6c64);\n  display:flex; align-items:center; justify-content:center; font-weight:600; color:#042723; font-size:13px;\n}\n.call-info .name{font-size:13px; font-weight:600}\n.call-info .sub{font-size:12px; color:var(--ink-dim); font-family:var(--f-mono)}\n.waveband{display:flex; gap:2px; align-items:end; height:24px}\n.waveband span{width:2px; background:var(--teal); border-radius:1px; animation:wave 1.2s ease-in-out infinite}\n.waveband span:nth-child(1){height:30%; animation-delay:0s}\n.waveband span:nth-child(2){height:60%; animation-delay:.08s}\n.waveband span:nth-child(3){height:45%; animation-delay:.16s}\n.waveband span:nth-child(4){height:80%; animation-delay:.24s}\n.waveband span:nth-child(5){height:55%; animation-delay:.32s}\n.waveband span:nth-child(6){height:70%; animation-delay:.4s}\n.waveband span:nth-child(7){height:35%; animation-delay:.48s}\n.waveband span:nth-child(8){height:65%; animation-delay:.56s}\n.waveband span:nth-child(9){height:50%; animation-delay:.64s}\n@keyframes wave{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}\n\n.transcript{\n  margin-top:14px; border:1px solid var(--line); border-radius:10px;\n  background:rgba(15,27,45,.4); padding:14px 16px;\n  font-size:13px; line-height:1.55;\n}\n.transcript .t-row{display:grid; grid-template-columns:54px 1fr; gap:10px; padding:6px 0}\n.transcript .who{color:var(--ink-dim); font-family:var(--f-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; padding-top:3px}\n.transcript .msg{color:var(--ink)}\n.transcript .who.vv{color:var(--teal)}\n.tag{\n  display:inline-block; padding:2px 8px; border-radius:999px;\n  font-size:11px; font-family:var(--f-mono); letter-spacing:.06em;\n  background:rgba(25,179,166,.12); color:var(--teal); margin-left:6px;\n}\n.tag.brass{background:rgba(199,154,75,.14); color:var(--brass)}\n\n/* Floating pipeline chip */\n.float-chip{\n  position:absolute; right:-24px; top:-24px;\n  background:var(--stone); color:var(--navy);\n  border-radius:12px; padding:14px 16px; min-width:220px;\n  box-shadow:0 20px 50px -20px rgba(0,0,0,.8);\n  border:1px solid rgba(0,0,0,.06);\n  transform:rotate(2deg);\n}\n.float-chip .t{font-size:11px; font-family:var(--f-mono); letter-spacing:.14em; text-transform:uppercase; color:var(--graphite); margin-bottom:6px}\n.float-chip .m{font-family:var(--f-display); font-weight:600; font-size:15px; letter-spacing:-.01em; line-height:1.3}\n.float-chip .s{font-size:12px; color:rgba(42,51,64,.7); margin-top:4px; font-family:var(--f-num)}\n\n/* ===================== MARQUEE / OPERATORS ===================== */\n.trust{padding:28px 0; border-bottom:1px solid var(--line); background:var(--navy-2)}\n.trust-row{display:flex; align-items:center; justify-content:space-between; gap:32px; flex-wrap:wrap; color:var(--ink-dim); font-size:13px}\n.trust-row .label{font-family:var(--f-mono); text-transform:uppercase; letter-spacing:.14em; font-size:11px}\n.logos{display:flex; gap:42px; align-items:center; flex-wrap:wrap; color:var(--ink-mute)}\n.logos span{font-family:var(--f-display); font-weight:600; letter-spacing:-.01em; font-size:17px; opacity:.72}\n\n/* ===================== PROBLEM REFRAME ===================== */\n.section{padding:120px 0; border-bottom:1px solid var(--line); position:relative}\n.section.light{background:var(--stone); color:var(--navy); border-color:rgba(15,27,45,.08)}\n.section.light .eyebrow{color:var(--graphite)}\n.section.light .eyebrow::before{background:var(--graphite)}\n.section.light h2, .section.light h3{color:var(--navy)}\n.section.light p{color:rgba(42,51,64,.75)}\n\n.section-head{display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:end; margin-bottom:56px}\n.section-head h2{font-size:clamp(34px, 3.6vw, 52px); line-height:1.05; max-width:720px}\n.section-head p{font-size:17px; line-height:1.55; color:var(--ink-mute); max-width:520px}\n\n.compare{\n  display:grid; grid-template-columns:1fr 64px 1fr; gap:0; align-items:stretch;\n  border:1px solid rgba(15,27,45,.08); border-radius:16px; overflow:hidden;\n  background:#fff;\n}\n.compare-col{padding:36px 36px 40px}\n.compare-col.bad{background:#fff}\n.compare-col.good{background:var(--navy); color:var(--ink)}\n.compare-col p{font-size:15px; line-height:1.6; color:rgba(42,51,64,.82); margin-top:12px}\n.compare-col.good p{color:var(--ink); font-weight:400}\n.compare-divider{\n  background:var(--stone-2);\n  display:flex; align-items:center; justify-content:center;\n  font-family:var(--f-mono); font-size:11px; letter-spacing:.14em; color:var(--graphite);\n  writing-mode:vertical-rl; transform:rotate(180deg);\n  border-left:1px solid rgba(15,27,45,.06);\n  border-right:1px solid rgba(15,27,45,.06);\n}\n.compare h3{font-size:13px; font-family:var(--f-mono); letter-spacing:.14em; text-transform:uppercase; margin-bottom:16px}\n.compare .big{font-family:var(--f-display); font-size:32px; letter-spacing:-.02em; line-height:1.1; font-weight:600; margin-bottom:18px}\n.compare .big em{font-style:normal}\n.compare-col.bad .big em{color:var(--coral)}\n.compare-col.good .big em{color:var(--teal)}\n.compare ul{list-style:none; padding:0; margin:18px 0 0; display:grid; gap:10px}\n.compare li{font-size:14px; display:flex; gap:10px; align-items:flex-start; color:rgba(42,51,64,.78)}\n.compare-col.good li{color:var(--ink-mute)}\n.compare li::before{\n  content:\"\"; width:6px; height:6px; border-radius:50%;\n  background:var(--coral); margin-top:8px; flex:0 0 6px;\n}\n.compare-col.good li::before{background:var(--teal)}\n.compare .row{\n  display:grid; grid-template-columns:1fr auto; align-items:center;\n  padding:12px 0; border-top:1px dashed rgba(15,27,45,.1); font-size:13px;\n}\n.compare-col.good .row{border-color:rgba(238,233,225,.1)}\n.compare .row .k{color:rgba(42,51,64,.6); font-family:var(--f-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase}\n.compare-col.good .row .k{color:var(--ink-dim)}\n.compare .row .v{font-family:var(--f-num); font-weight:600; font-size:16px}\n.compare-col.bad .v{color:var(--coral)}\n.compare-col.good .v{color:var(--emerald)}\n\n/* ===================== PILLARS ===================== */\n.pillars{display:grid; grid-template-columns:repeat(3,1fr); gap:20px}\n.pillar{\n  border:1px solid var(--line-2); border-radius:14px; padding:28px;\n  background:linear-gradient(180deg, rgba(238,233,225,.03), rgba(238,233,225,.01));\n  display:flex; flex-direction:column; gap:14px;\n  position:relative; overflow:hidden;\n}\n.pillar .idx{\n  font-family:var(--f-mono); font-size:11px; letter-spacing:.14em; color:var(--teal);\n}\n.pillar h3{font-size:22px; line-height:1.2; letter-spacing:-.015em}\n.pillar p{color:var(--ink-mute); font-size:14.5px; line-height:1.55}\n.pillar .viz{\n  margin-top:12px; border-top:1px solid var(--line); padding-top:18px;\n}\n.meter{display:grid; grid-template-columns:1fr auto; align-items:center; gap:10px; padding:6px 0; font-size:13px}\n.meter .bar{height:6px; border-radius:3px; background:rgba(238,233,225,.08); overflow:hidden; width:100%; grid-column:1/3; margin-top:4px}\n.meter .bar > i{display:block; height:100%; background:var(--teal); border-radius:3px}\n.meter .bar.bad > i{background:var(--coral)}\n.meter .label{color:var(--ink-mute); font-family:var(--f-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase}\n.meter .v{font-family:var(--f-num); font-weight:600}\n\n/* Pipeline mini visual */\n.pipe-mini{display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:8px}\n.pipe-mini .node{\n  border:1px solid var(--line); border-radius:6px; padding:8px 6px;\n  font-family:var(--f-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; text-align:center;\n  color:var(--ink-dim);\n}\n.pipe-mini .node.on{background:rgba(25,179,166,.12); color:var(--teal); border-color:rgba(25,179,166,.3)}\n\n/* Inquiry viz */\n.inq-list{display:grid; gap:8px; margin-top:8px}\n.inq-list .row{display:grid; grid-template-columns:1fr auto; align-items:center; font-size:13px; padding:6px 0; border-bottom:1px dashed rgba(238,233,225,.08)}\n.inq-list .row:last-child{border-bottom:none}\n.inq-list .row .q{color:var(--ink-mute)}\n.inq-list .row .a{color:var(--emerald); font-family:var(--f-mono); font-size:11px}\n\n/* ===================== WORKFLOW / PIPELINE ===================== */\n.pipeline-shell{\n  border-radius:18px; border:1px solid var(--line-2);\n  background:linear-gradient(180deg, rgba(238,233,225,.03), rgba(238,233,225,.01));\n  padding:32px;\n}\n.pipeline{\n  display:grid; grid-template-columns:repeat(5,1fr); gap:16px; position:relative;\n}\n.stage{\n  border:1px solid var(--line-2); border-radius:12px; padding:16px; background:rgba(15,27,45,.6);\n  position:relative; min-height:200px;\n}\n.stage-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}\n.stage-name{font-size:12px; font-family:var(--f-mono); letter-spacing:.14em; text-transform:uppercase; color:var(--ink-dim)}\n.stage-count{font-family:var(--f-num); font-weight:600; color:var(--teal)}\n.card-party{\n  border:1px solid var(--line); border-radius:8px; padding:10px 12px;\n  background:rgba(238,233,225,.03); margin-bottom:8px; font-size:12.5px;\n}\n.card-party .t{font-weight:600; font-family:var(--f-display); letter-spacing:-.005em}\n.card-party .s{color:var(--ink-dim); font-family:var(--f-num); margin-top:3px; font-size:11.5px}\n.card-party.active{border-color:var(--teal); background:rgba(25,179,166,.08); box-shadow:0 0 0 1px rgba(25,179,166,.25) inset}\n.card-party.risk{border-color:rgba(239,68,68,.4); background:rgba(239,68,68,.06)}\n.card-party.risk .s{color:var(--coral)}\n.card-party.done{opacity:.82}\n.card-party .chip{\n  display:inline-block; padding:2px 6px; border-radius:4px; font-family:var(--f-mono); font-size:10px; letter-spacing:.08em;\n  background:rgba(16,185,129,.12); color:var(--emerald); text-transform:uppercase; margin-top:6px;\n}\n.card-party .chip.brass{background:rgba(199,154,75,.15); color:var(--brass)}\n.card-party .chip.coral{background:rgba(239,68,68,.14); color:var(--coral)}\n\n/* Process diagram (replaces kanban) */\n.process{\n  display:grid; grid-template-columns:1fr auto 1fr auto 1fr auto 1fr auto 1fr;\n  gap:18px; align-items:stretch;\n}\n.p-step{\n  border:1px solid var(--line-2); border-radius:14px; padding:22px 20px 24px;\n  background:rgba(238,233,225,.02); display:flex; flex-direction:column; gap:6px;\n}\n.p-num{font-family:var(--f-mono); font-size:11px; letter-spacing:.18em; color:var(--teal)}\n.p-name{font-family:var(--f-display); font-size:20px; font-weight:600; letter-spacing:-.015em}\n.p-desc{font-size:13px; line-height:1.5; color:var(--ink-mute); margin-top:4px}\n.p-arrow{\n  display:flex; align-items:center; justify-content:center;\n  color:var(--ink-dim); font-size:18px; font-family:var(--f-mono);\n}\n.process-note{\n  margin-top:28px; padding-top:22px; border-top:1px solid var(--line);\n  font-size:13px; color:var(--ink-mute); font-family:var(--f-mono);\n  letter-spacing:.04em;\n}\n\n/* Minimal hero stack */\n.minimal-hero{ padding:28px 28px 30px }\n.minimal-stack{display:grid; gap:0}\n.m-row{\n  display:grid; grid-template-columns:36px 1fr; gap:14px; align-items:center;\n  padding:16px 4px; border-bottom:1px solid var(--line);\n}\n.m-row:last-child{border-bottom:none}\n.m-icon{\n  width:32px; height:32px; border-radius:8px; display:flex; align-items:center;\n  justify-content:center; font-size:14px; font-family:var(--f-mono);\n  border:1px solid var(--line-2);\n}\n.m-icon.teal{color:var(--teal); background:rgba(25,179,166,.08); border-color:rgba(25,179,166,.25)}\n.m-icon.brass{color:var(--brass); background:rgba(199,154,75,.1); border-color:rgba(199,154,75,.28)}\n.m-icon.emerald{color:var(--emerald); background:rgba(16,185,129,.1); border-color:rgba(16,185,129,.3)}\n.m-k{font-size:14px; font-weight:600; letter-spacing:-.005em}\n.m-v{font-size:12.5px; color:var(--ink-mute); font-family:var(--f-num); margin-top:2px}\n.m-row.done .m-k{color:var(--emerald)}\n\n/* Built-for line (replaces trust) */\n.built-for{padding:28px 0; border-bottom:1px solid var(--line); text-align:center}\n.built-for p{font-family:var(--f-mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-dim); margin:0}\n\n/* Multi-location simple */\n.multi-simple{display:grid; grid-template-columns:repeat(3,1fr); gap:40px}\n.ms-item{padding:24px; border:1px solid var(--line-2); border-radius:14px; background:rgba(238,233,225,.02)}\n\n/* Footer simple */\n.foot-simple{grid-template-columns:2fr 1fr !important}\n\n/* Icon button (theme toggle) */\n.icon-btn{\n  width:36px; height:36px; display:flex; align-items:center; justify-content:center;\n  border-radius:8px; border:1px solid var(--line-2); background:transparent;\n  color:var(--ink-mute); cursor:pointer; transition:all .2s;\n}\n.icon-btn:hover{color:var(--ink); border-color:var(--ink-mute)}\nbody.theme-day .icon-btn{color:rgba(42,51,64,.7); border-color:rgba(15,27,45,.12)}\nbody.theme-day .icon-btn:hover{color:var(--navy); border-color:rgba(15,27,45,.25)}\nbody.theme-day .icon-btn .icon-moon{display:none !important}\nbody.theme-day .icon-btn .icon-sun{display:block !important}\n\n.pipeline::before{\n  /* connector line */\n  content:\"\"; position:absolute; top:46px; left:5%; right:5%; height:1px;\n  background:linear-gradient(90deg, transparent, var(--line-2), var(--line-2), transparent);\n  z-index:0;\n}\n\n.pipeline-foot{\n  display:grid; grid-template-columns:repeat(4, 1fr); gap:20px; margin-top:28px;\n  padding-top:24px; border-top:1px solid var(--line);\n}\n.pipeline-stat .l{font-size:11px; font-family:var(--f-mono); letter-spacing:.14em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:6px}\n.pipeline-stat .v{font-family:var(--f-num); font-size:26px; font-weight:600; letter-spacing:-.01em}\n.pipeline-stat .d{font-size:12px; color:var(--emerald); font-family:var(--f-num); margin-top:2px}\n\n/* ===================== DEMO / PROOF ===================== */\n.demo-grid{display:grid; grid-template-columns:1.1fr .9fr; gap:32px; align-items:stretch}\n.player{\n  border:1px solid rgba(15,27,45,.1); border-radius:18px; padding:28px;\n  background:#fff; color:var(--navy); display:flex; flex-direction:column; gap:18px;\n  position:relative; overflow:hidden;\n}\n.player .meta-row{display:flex; justify-content:space-between; align-items:center; font-family:var(--f-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--graphite)}\n.player h3{font-size:26px; letter-spacing:-.02em; line-height:1.2; color:var(--navy)}\n.player .controls{\n  display:flex; align-items:center; gap:16px; padding:16px;\n  border-radius:12px; background:var(--stone-2); border:1px solid rgba(15,27,45,.06);\n}\n.play-btn{\n  width:52px; height:52px; border-radius:50%; border:none; cursor:pointer;\n  background:var(--navy); color:var(--teal); display:flex; align-items:center; justify-content:center;\n  flex:0 0 52px;\n}\n.play-btn:hover{background:var(--graphite)}\n.scrubber{flex:1; position:relative; height:28px; display:flex; align-items:center}\n.scrub-line{height:3px; background:rgba(15,27,45,.1); border-radius:2px; width:100%; position:relative; overflow:hidden}\n.scrub-line > i{display:block; height:100%; width:34%; background:var(--navy); border-radius:2px}\n.time{font-family:var(--f-num); font-size:13px; color:var(--graphite); min-width:86px; text-align:right}\n.wave-static{display:flex; gap:2px; align-items:center; height:28px; flex:1;}\n.wave-static span{display:block; width:2px; background:rgba(15,27,45,.25); border-radius:1px}\n\n.demo-transcript{\n  border:1px solid var(--line-2); border-radius:18px; padding:28px;\n  background:var(--navy-2);\n}\n.demo-transcript h4{font-size:13px; font-family:var(--f-mono); letter-spacing:.14em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:16px}\n.demo-transcript .t-row{padding:10px 0; border-bottom:1px solid var(--line); font-size:14px; line-height:1.55}\n.demo-transcript .t-row:last-child{border-bottom:none}\n.demo-transcript .who{font-family:var(--f-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:4px}\n.demo-transcript .who.vv{color:var(--teal)}\n.demo-transcript .msg{color:var(--ink)}\n\n.proof-row{\n  display:grid; grid-template-columns:repeat(4,1fr); gap:0;\n  margin-top:36px; border:1px solid var(--line-2); border-radius:12px; overflow:hidden;\n}\n.proof-item{padding:24px; border-right:1px solid var(--line-2)}\n.proof-item:last-child{border-right:none}\n.proof-item .v{font-family:var(--f-num); font-size:34px; font-weight:600; letter-spacing:-.015em}\n.proof-item .v .u{font-size:18px; color:var(--ink-dim); margin-left:2px}\n.proof-item .l{font-size:12px; color:var(--ink-mute); margin-top:6px; line-height:1.4}\n\n/* ===================== MULTI-LOCATION ===================== */\n.multi{\n  display:grid; grid-template-columns:1.1fr .9fr; gap:64px; align-items:center;\n}\n.multi-viz{\n  border:1px solid var(--line-2); border-radius:18px; padding:24px;\n  background:linear-gradient(180deg, rgba(238,233,225,.03), rgba(238,233,225,.01));\n}\n.loc-row{\n  display:grid; grid-template-columns:140px 1fr 100px 90px; gap:16px; align-items:center;\n  padding:14px 0; border-bottom:1px solid var(--line);\n}\n.loc-row:last-child{border-bottom:none}\n.loc-row .nm{font-weight:600; font-family:var(--f-display); letter-spacing:-.01em}\n.loc-row .nm span{display:block; font-size:12px; color:var(--ink-dim); font-weight:400; font-family:var(--f-mono); letter-spacing:.05em; margin-top:2px}\n.loc-row .bar{height:8px; background:rgba(238,233,225,.08); border-radius:4px; overflow:hidden; position:relative}\n.loc-row .bar > i{display:block; height:100%; background:var(--teal); border-radius:4px}\n.loc-row .pct{font-family:var(--f-num); font-weight:600; text-align:right}\n.loc-row .pct.up{color:var(--emerald)}\n.loc-row .status{font-family:var(--f-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--teal); text-align:right}\n.multi-head{padding-bottom:14px; border-bottom:1px solid var(--line); margin-bottom:8px; display:flex; justify-content:space-between; align-items:baseline}\n.multi-head .t{font-family:var(--f-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-dim)}\n.multi-head .v{font-family:var(--f-num); font-size:14px; color:var(--ink-mute)}\n\n/* ===================== DASHBOARD PREVIEW ===================== */\n.dash{\n  border:1px solid rgba(15,27,45,.08); border-radius:18px; overflow:hidden; background:#fff;\n  box-shadow:0 40px 80px -40px rgba(15,27,45,.3);\n}\n.dash-top{\n  padding:18px 24px; border-bottom:1px solid rgba(15,27,45,.06);\n  display:flex; align-items:center; justify-content:space-between;\n  background:var(--stone-2);\n}\n.dash-top .tabs{display:flex; gap:20px}\n.dash-top .tabs a{font-size:13px; color:rgba(42,51,64,.6); padding:6px 0}\n.dash-top .tabs a.active{color:var(--navy); font-weight:600; border-bottom:2px solid var(--navy)}\n.dash-top .window{display:flex; gap:6px}\n.dash-top .window i{width:10px; height:10px; border-radius:50%; background:rgba(15,27,45,.15)}\n.dash-body{padding:28px; background:#fff; color:var(--navy)}\n.dash-kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px}\n.kpi{padding:18px; border:1px solid rgba(15,27,45,.08); border-radius:12px}\n.kpi .l{font-size:11px; font-family:var(--f-mono); letter-spacing:.14em; text-transform:uppercase; color:rgba(42,51,64,.55); margin-bottom:10px}\n.kpi .v{font-family:var(--f-num); font-size:30px; font-weight:600; letter-spacing:-.015em; color:var(--navy)}\n.kpi .v .u{font-size:16px; color:rgba(42,51,64,.5); margin-left:3px}\n.kpi .d{font-size:12px; color:var(--emerald); margin-top:6px; font-family:var(--f-num); font-weight:500}\n.kpi.accent{background:var(--navy); color:var(--ink); border-color:var(--navy)}\n.kpi.accent .l{color:rgba(238,233,225,.55)}\n.kpi.accent .v{color:var(--teal)}\n.kpi.accent .d{color:var(--emerald)}\n\n.dash-lower{display:grid; grid-template-columns:1.3fr .7fr; gap:20px}\n.chart{\n  border:1px solid rgba(15,27,45,.08); border-radius:12px; padding:20px;\n}\n.chart-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px}\n.chart-head h4{font-size:15px; color:var(--navy); letter-spacing:-.01em}\n.chart-head .legend{display:flex; gap:14px; font-size:12px; color:rgba(42,51,64,.6); font-family:var(--f-mono); letter-spacing:.06em}\n.chart-head .legend span{display:inline-flex; align-items:center; gap:6px}\n.chart-head .legend i{width:8px; height:8px; border-radius:2px; display:inline-block}\n.chart-plot{height:160px; display:flex; align-items:end; gap:6px; padding-top:4px}\n.bar-col{flex:1; display:flex; flex-direction:column; gap:3px; align-items:stretch; height:100%; justify-content:end}\n.bar-col i{display:block; border-radius:3px 3px 0 0}\n.bar-col i.a{background:var(--navy)}\n.bar-col i.b{background:var(--teal)}\n.chart-x{display:flex; gap:6px; margin-top:8px; font-family:var(--f-mono); font-size:10px; letter-spacing:.08em; color:rgba(42,51,64,.45); text-transform:uppercase}\n.chart-x span{flex:1; text-align:center}\n\n.activity{\n  border:1px solid rgba(15,27,45,.08); border-radius:12px; padding:20px;\n}\n.activity h4{font-size:15px; color:var(--navy); margin-bottom:14px; letter-spacing:-.01em}\n.act-row{padding:10px 0; border-bottom:1px dashed rgba(15,27,45,.1); font-size:13px; display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center}\n.act-row:last-child{border-bottom:none}\n.dot{width:8px; height:8px; border-radius:50%}\n.dot.t{background:var(--teal)}\n.dot.e{background:var(--emerald)}\n.dot.b{background:var(--brass)}\n.dot.c{background:var(--coral)}\n.act-row .msg{color:var(--navy)}\n.act-row .time{font-family:var(--f-mono); font-size:11px; color:rgba(42,51,64,.45)}\n\n/* ===================== FINAL CTA ===================== */\n.final-cta{\n  padding:120px 0;\n  background:\n    radial-gradient(900px 500px at 50% 120%, rgba(25,179,166,.15), transparent 60%),\n    var(--navy-2);\n  text-align:center; border-bottom:1px solid var(--line);\n  position:relative; overflow:hidden;\n}\n.final-cta::before{\n  content:\"\"; position:absolute; inset:0;\n  background-image:\n    linear-gradient(to right, rgba(238,233,225,.04) 1px, transparent 1px),\n    linear-gradient(to bottom, rgba(238,233,225,.04) 1px, transparent 1px);\n  background-size:80px 80px;\n  mask-image:radial-gradient(600px 400px at 50% 50%, #000 10%, transparent 70%);\n  pointer-events:none;\n}\n.final-cta h2{font-size:clamp(38px, 4.6vw, 68px); line-height:1.05; margin:18px auto 18px; max-width:900px}\n.final-cta p{color:var(--ink-mute); font-size:18px; max-width:620px; margin:0 auto 30px}\n.final-cta .cta-row{display:flex; gap:12px; justify-content:center; flex-wrap:wrap}\n\n/* ===================== FOOTER ===================== */\nfooter{padding:56px 0 40px; background:var(--navy-2); color:var(--ink-mute); font-size:13px}\n.foot-top{display:grid; grid-template-columns:1.3fr 1fr 1fr 1fr; gap:48px; margin-bottom:40px}\n.foot-top h5{color:var(--ink); font-size:12px; font-family:var(--f-mono); letter-spacing:.14em; text-transform:uppercase; margin:0 0 14px}\n.foot-top ul{list-style:none; padding:0; margin:0; display:grid; gap:10px}\n.foot-top a:hover{color:var(--ink)}\n.foot-bottom{padding-top:24px; border-top:1px solid var(--line); display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; font-size:12px; color:var(--ink-dim); font-family:var(--f-mono); letter-spacing:.06em; text-transform:uppercase}\n\n/* ===================== RESPONSIVE ===================== */\n@media (max-width:960px){\n  .container{padding:0 20px}\n  .hero{padding:48px 0 48px}\n  .hero-grid{grid-template-columns:1fr; gap:40px}\n  .nav ul{display:none}\n  .section{padding:72px 0}\n  .section-head{grid-template-columns:1fr; gap:20px; margin-bottom:36px}\n  .compare{grid-template-columns:1fr}\n  .compare-divider{writing-mode:horizontal-tb; transform:none; padding:10px; border-left:none; border-right:none; border-top:1px solid rgba(15,27,45,.06); border-bottom:1px solid rgba(15,27,45,.06)}\n  .pillars{grid-template-columns:1fr}\n  .pipeline{grid-template-columns:1fr; gap:10px}\n  .process{grid-template-columns:1fr}\n  .p-arrow{transform:rotate(90deg); padding:4px 0}\n  .multi-simple{grid-template-columns:1fr; gap:16px}\n  .foot-simple{grid-template-columns:1fr !important}\n  .pipeline::before{display:none}\n  .pipeline-foot{grid-template-columns:repeat(2,1fr); gap:16px}\n  .demo-grid{grid-template-columns:1fr}\n  .proof-row{grid-template-columns:repeat(2,1fr)}\n  .proof-item{border-right:none; border-bottom:1px solid var(--line-2)}\n  .proof-item:nth-child(even){border-right:none}\n  .multi{grid-template-columns:1fr; gap:32px}\n  .dash-kpis{grid-template-columns:repeat(2,1fr)}\n  .dash-lower{grid-template-columns:1fr}\n  .foot-top{grid-template-columns:1fr 1fr; gap:24px}\n  .loc-row{grid-template-columns:120px 1fr 70px; }\n  .loc-row .status{display:none}\n  .float-chip{right:8px; top:-10px; min-width:180px}\n  .nav-cta .btn-ghost{display:none}\n}\n\n/* ===================== TWEAKS ===================== */\n.tweaks{\n  position:fixed; right:20px; bottom:20px; z-index:60;\n  width:280px;\n  background:#0B1422; border:1px solid var(--line-2); border-radius:12px;\n  padding:16px; box-shadow:0 30px 60px -20px rgba(0,0,0,.7);\n  display:none;\n}\n.tweaks.on{display:block}\n.tweaks h5{font-family:var(--f-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-dim); margin:0 0 12px; display:flex; justify-content:space-between; align-items:center}\n.tweaks h5 button{background:transparent; border:none; color:var(--ink-mute); cursor:pointer; font-size:16px}\n.tweaks .group{margin-bottom:14px}\n.tweaks .group label{display:block; font-size:11px; font-family:var(--f-mono); letter-spacing:.1em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:6px}\n.tweaks .opts{display:flex; gap:6px; flex-wrap:wrap}\n.tweaks .opts button{\n  flex:1; min-width:0; padding:8px 10px; font-size:12px; border-radius:6px;\n  border:1px solid var(--line-2); background:transparent; color:var(--ink-mute); cursor:pointer;\n  font-family:var(--f-sans);\n}\n.tweaks .opts button.on{background:var(--teal); color:#042723; border-color:var(--teal)}\n.tweaks .swatch{display:flex; gap:8px}\n.tweaks .swatch button{width:28px; height:28px; border-radius:6px; border:2px solid transparent; cursor:pointer; padding:0}\n.tweaks .swatch button.on{border-color:var(--ink)}\n\n/* Theme: daylight */\nbody.theme-day{background:var(--stone); color:var(--navy)}\nbody.theme-day .nav{background:rgba(246,242,235,.85); border-color:rgba(15,27,45,.08)}\nbody.theme-day .nav ul{color:rgba(42,51,64,.7)}\nbody.theme-day .hero{background:\n    radial-gradient(1100px 500px at 85% -10%, rgba(25,179,166,.12), transparent 60%),\n    radial-gradient(700px 400px at 10% 100%, rgba(199,154,75,.1), transparent 70%),\n    var(--stone);\n  color:var(--navy); border-color:rgba(15,27,45,.08)}\nbody.theme-day .hero::before{\n  background-image:\n    linear-gradient(to right, rgba(15,27,45,.05) 1px, transparent 1px),\n    linear-gradient(to bottom, rgba(15,27,45,.05) 1px, transparent 1px);\n}\nbody.theme-day .hero p.sub{color:rgba(42,51,64,.75)}\nbody.theme-day .hero .meta{color:rgba(42,51,64,.55); border-color:rgba(15,27,45,.08)}\nbody.theme-day .hero .meta strong{color:var(--navy)}\nbody.theme-day .hero h1 em{background:linear-gradient(180deg, #19B3A6, #0F7E75); -webkit-background-clip:text; background-clip:text; color:transparent}\nbody.theme-day .console{background:#fff; border-color:rgba(15,27,45,.08); box-shadow:0 30px 60px -30px rgba(15,27,45,.3)}\nbody.theme-day .console .stat{border-color:rgba(15,27,45,.08); background:var(--stone-2)}\nbody.theme-day .console .stat .value{color:var(--navy)}\nbody.theme-day .console-call{background:var(--stone-2); border-color:rgba(15,27,45,.08)}\nbody.theme-day .console .call-info .name{color:var(--navy)}\nbody.theme-day .transcript{background:var(--stone-2); border-color:rgba(15,27,45,.08)}\nbody.theme-day .transcript .msg{color:var(--navy)}\nbody.theme-day .trust{background:var(--stone-2); border-color:rgba(15,27,45,.08)}\nbody.theme-day .trust-row, body.theme-day .logos{color:rgba(42,51,64,.55)}\nbody.theme-day .logos span{color:rgba(42,51,64,.6)}\nbody.theme-day .section{border-color:rgba(15,27,45,.08)}\nbody.theme-day .section:not(.light){background:var(--stone); color:var(--navy)}\nbody.theme-day .section h2{color:var(--navy)}\nbody.theme-day .section p{color:rgba(42,51,64,.7)}\nbody.theme-day .section-head p{color:rgba(42,51,64,.7)}\nbody.theme-day .pillar{background:#fff; border-color:rgba(15,27,45,.08)}\nbody.theme-day .pillar p{color:rgba(42,51,64,.7)}\nbody.theme-day .pillar .viz{border-color:rgba(15,27,45,.08)}\nbody.theme-day .pipeline-shell{background:#fff; border-color:rgba(15,27,45,.08)}\nbody.theme-day .stage{background:var(--stone-2); border-color:rgba(15,27,45,.08)}\nbody.theme-day .card-party{background:#fff; border-color:rgba(15,27,45,.08)}\nbody.theme-day .stage-name{color:rgba(42,51,64,.55)}\nbody.theme-day .multi-viz{background:#fff; border-color:rgba(15,27,45,.08)}\nbody.theme-day .loc-row .bar{background:rgba(15,27,45,.08)}\nbody.theme-day .loc-row{border-color:rgba(15,27,45,.08)}\nbody.theme-day .final-cta{background:var(--stone-2)}\nbody.theme-day .final-cta h2{color:var(--navy)}\nbody.theme-day .final-cta p{color:rgba(42,51,64,.7)}\nbody.theme-day footer{background:var(--stone-2); color:rgba(42,51,64,.65)}\nbody.theme-day footer h5{color:var(--navy)}\nbody.theme-day .foot-bottom{border-color:rgba(15,27,45,.08)}\nbody.theme-day .section.light{background:#fff}\n\n/* Accent variants */\nbody.accent-brass{--teal:#C79A4B; --teal-soft:rgba(199,154,75,.14)}\nbody.accent-emerald{--teal:#10B981; --teal-soft:rgba(16,185,129,.12)}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ========================= NAV ========================= -->\n<nav class=\"nav\">\n  <div class=\"container nav-inner\">\n    <a class=\"brand\" href=\"#\">\n      <span class=\"mark\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 26 26\" fill=\"none\">\n          <path d=\"M3 4 L10 20 L13 13 L16 20 L23 4\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"square\" stroke-linejoin=\"miter\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fspan>\n      VenueVox\n    <\u002Fa>\n    <ul>\n      <li><a href=\"#problem\">Problem<\u002Fa><\u002Fli>\n      <li><a href=\"#pillars\">Product<\u002Fa><\u002Fli>\n      <li><a href=\"#workflow\">Party Pipeline<\u002Fa><\u002Fli>\n      <li><a href=\"#demo\">Demo<\u002Fa><\u002Fli>\n      <li><a href=\"#dashboard\">Dashboard<\u002Fa><\u002Fli>\n      <li><a href=\"#pricing\">Pricing<\u002Fa><\u002Fli>\n    <\u002Ful>\n    <div class=\"nav-cta\">\n      <button class=\"icon-btn\" id=\"themeToggle\" aria-label=\"Toggle theme\" title=\"Toggle theme\">\n        <svg class=\"icon-moon\" width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M13 10.5A6 6 0 0 1 5.5 3c0-.4 0-.8.1-1.2A6 6 0 1 0 14.2 10.4c-.4.1-.8.1-1.2.1z\" fill=\"currentColor\"><\u002Fpath><\u002Fsvg>\n        <svg class=\"icon-sun\" width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" style=\"display:none\"><circle cx=\"8\" cy=\"8\" r=\"3\" fill=\"currentColor\"><\u002Fcircle><g stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><path d=\"M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.4 1.4M11.6 11.6L13 13M3 13l1.4-1.4M11.6 4.4L13 3\"><\u002Fpath><\u002Fg><\u002Fsvg>\n      <\u002Fbutton>\n      <button class=\"btn btn-primary btn-sm\">Book a demo <span class=\"arrow\">→<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ========================= HERO ========================= -->\n<section class=\"hero\">\n  <div class=\"container hero-grid\">\n    <div>\n      <span class=\"eyebrow\">Front-end revenue layer · Eatertainment<\u002Fspan>\n      <h1>Your phone gets answered.<br><em>But is it selling?<\u002Fem><\u002Fh1>\n      <p class=\"sub\">\n        VenueVox answers calls, announces promos, and manages party bookings to deposit —\n        with the consistency of your best employee, at a fraction of the cost.\n        No training. No turnover. No skipped upsells.\n      <\u002Fp>\n      <div class=\"cta-row\">\n        <button class=\"btn btn-primary\">Book a demo <span class=\"arrow\">→<\u002Fspan><\u002Fbutton>\n        <button class=\"btn btn-ghost\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"currentColor\"><path d=\"M3 2 L11 7 L3 12 Z\"><\u002Fpath><\u002Fsvg>\n          Hear VenueVox sell a promo\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"meta\">\n        <div><strong class=\"num\">94%<\u002Fstrong>promo delivery target<\u002Fdiv>\n        <div><strong class=\"num\">48 hrs<\u002Fstrong>designed inquiry → deposit<\u002Fdiv>\n        <div><strong class=\"num\">&lt; 1 FTE<\u002Fstrong>designed to replace part‑time phone labor<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Hero visual: Minimal (default) -->\n    <div style=\"position:relative\">\n      <div class=\"console minimal-hero\">\n        <div class=\"console-head\">\n          <div class=\"title\"><span class=\"pulse\"><\u002Fspan> Active · Saturday evening<\u002Fdiv>\n          <div class=\"mono\" style=\"font-size:11px; color:var(--ink-dim); letter-spacing:.12em\">VENUEVOX<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"minimal-stack\">\n          <div class=\"m-row\">\n            <div class=\"m-icon teal\">→<\u002Fdiv>\n            <div>\n              <div class=\"m-k\">Incoming call<\u002Fdiv>\n              <div class=\"m-v\">Party inquiry · 12–15 guests, Saturday<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"m-row\">\n            <div class=\"m-icon teal\">●<\u002Fdiv>\n            <div>\n              <div class=\"m-k\">Promo announced<\u002Fdiv>\n              <div class=\"m-v\">Game card bonus · load $100, +$20<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"m-row\">\n            <div class=\"m-icon brass\">▫<\u002Fdiv>\n            <div>\n              <div class=\"m-k\">Hold placed · 24h<\u002Fdiv>\n              <div class=\"m-v\">Package presented · upsell attempted<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"m-row done\">\n            <div class=\"m-icon emerald\">✓<\u002Fdiv>\n            <div>\n              <div class=\"m-k\">Deposit link sent<\u002Fdiv>\n              <div class=\"m-v\">Auto-follow-up armed · 2h<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"float-chip\">\n        <div class=\"t\">+ Deposit collected<\u002Fdiv>\n        <div class=\"m\">Party confirmed — Delgado party, 15 guests<\u002Fdiv>\n        <div class=\"s\">Sat 4:00pm · Lane 12 · $150 deposit · +$45 upsell<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= BUILT-FOR LINE ========================= -->\n<section class=\"built-for\">\n  <div class=\"container\">\n    <p>Built for bowling centers, barcades, axe throwing venues, and multi-concept FECs.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= PROBLEM REFRAME ========================= -->\n<section class=\"section light\" id=\"problem\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">The real leak<\u002Fspan>\n        <h2 style=\"margin-top:14px\">It's not missed calls.<br>It's answered calls that didn't sell.<\u002Fh2>\n      <\u002Fdiv>\n      <p>Your multi‑unit already pays someone to pick up. The variance isn't demand — it's execution. Most front desks mention this weekend's promo to <b>1 in 5 callers<\u002Fb>. Your best does it <b>every time<\u002Fb>.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"compare\">\n      <div class=\"compare-col bad\">\n        <h3>Part‑time front desk<\u002Fh3>\n        <div class=\"big\">Call <em>answered<\u002Fem>. Revenue <em>left on the floor.<\u002Fem><\u002Fdiv>\n        <p>Phone gets picked up. Question gets answered. Promo doesn't. Lead sits on a sticky note. Deposit never lands. Next week a new hire starts from zero.<\u002Fp>\n        <ul>\n          <li>Mentions weekend promo ~20% of calls<\u002Fli>\n          <li>Party leads live in a notebook, not a pipeline<\u002Fli>\n          <li>Upsells drop the moment training ends<\u002Fli>\n          <li>Inconsistent across shifts, worse across locations<\u002Fli>\n        <\u002Ful>\n        <div class=\"row\"><div class=\"k\">Promo delivered<\u002Fdiv><div class=\"v\">≈ 1 in 5<\u002Fdiv><\u002Fdiv>\n        <div class=\"row\"><div class=\"k\">Party lead follow-up<\u002Fdiv><div class=\"v\">Ad hoc<\u002Fdiv><\u002Fdiv>\n        <div class=\"row\"><div class=\"k\">Consistency<\u002Fdiv><div class=\"v\">Shift-dependent<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"compare-divider\">vs.<\u002Fdiv>\n\n      <div class=\"compare-col good\">\n        <h3>VenueVox<\u002Fh3>\n        <div class=\"big\">Call <em>answered.<\u002Fem> Revenue <em>captured.<\u002Fem><\u002Fdiv>\n        <p>Every caller hears the current promo. Every party inquiry enters a pipeline. Deposit links go out. Follow‑ups fire automatically. The solved state — every shift, every location, every time.<\u002Fp>\n        <ul>\n          <li>Announces the active promo on every call<\u002Fli>\n          <li>Party pipeline: inquiry → hold → deposit → confirmed<\u002Fli>\n          <li>Upsell attempted on every qualifying package<\u002Fli>\n          <li>One script, every location — Tuesday and Saturday<\u002Fli>\n        <\u002Ful>\n        <div class=\"row\"><div class=\"k\">Promo delivered<\u002Fdiv><div class=\"v\">Every qualifying call<\u002Fdiv><\u002Fdiv>\n        <div class=\"row\"><div class=\"k\">Party lead follow-up<\u002Fdiv><div class=\"v\">Automated<\u002Fdiv><\u002Fdiv>\n        <div class=\"row\"><div class=\"k\">Consistency<\u002Fdiv><div class=\"v\">Every shift<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= THREE PILLARS ========================= -->\n<section class=\"section\" id=\"pillars\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">Three things we do, always<\u002Fspan>\n        <h2 style=\"margin-top:14px\">The consistency of your best employee.<br>Every call, every location.<\u002Fh2>\n      <\u002Fdiv>\n      <p>VenueVox isn't a voice bot — it's a front‑end revenue layer. It announces the promo, closes the party, and handles the rest so your floor stays on the floor.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"pillars\">\n      <!-- Pillar 1 -->\n      <div class=\"pillar\">\n        <div class=\"idx\">01 · PROMO CONSISTENCY<\u002Fdiv>\n        <h3>Every caller hears the promo.<\u002Fh3>\n        <p>Your weekend special lives on the sign. It should live on every call, too. VenueVox announces the active promo on every qualifying call — no training, no reminders, no \"I forgot.\"<\u002Fp>\n        <div class=\"viz\">\n          <div class=\"meter\">\n            <div class=\"label\">VenueVox · this week<\u002Fdiv>\n            <div class=\"v num\" style=\"color:var(--teal)\">94%<\u002Fdiv>\n            <div class=\"bar\"><i style=\"width:94%\"><\u002Fi><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"meter\">\n            <div class=\"label\">Part‑time staff · same venue<\u002Fdiv>\n            <div class=\"v num\" style=\"color:var(--coral)\">22%<\u002Fdiv>\n            <div class=\"bar bad\"><i style=\"width:22%\"><\u002Fi><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Pillar 2 -->\n      <div class=\"pillar\">\n        <div class=\"idx\">02 · PARTY PIPELINE<\u002Fdiv>\n        <h3>Party bookings closed to deposit.<\u002Fh3>\n        <p>Birthdays are the highest‑margin line. Each booking is 4–5 calls. VenueVox runs the whole play: capture the inquiry, present the package, hold the date, send the link, follow up if payment stalls.<\u002Fp>\n        <div class=\"viz\">\n          <div class=\"pipe-mini\">\n            <div class=\"node on\">Inquiry<\u002Fdiv>\n            <div class=\"node on\">Hold<\u002Fdiv>\n            <div class=\"node on\">Sent<\u002Fdiv>\n            <div class=\"node\">Paid<\u002Fdiv>\n            <div class=\"node\">Confirm<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"meter\" style=\"margin-top:12px\">\n            <div class=\"label\">Inquiry → deposit · 48 hrs<\u002Fdiv>\n            <div class=\"v num\" style=\"color:var(--emerald)\">71%<\u002Fdiv>\n            <div class=\"bar\"><i style=\"width:71%; background:var(--emerald)\"><\u002Fi><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Pillar 3 -->\n      <div class=\"pillar\">\n        <div class=\"idx\">03 · GENERAL INQUIRIES<\u002Fdiv>\n        <h3>General inquiries at zero labor cost.<\u002Fh3>\n        <p>\"When do you close?\" \"Are you open Sunday?\" \"How much is bowling?\" Dozens per day, zero revenue, $17/hr to answer. VenueVox handles every one — accurately, instantly, without pulling a single person off the floor.<\u002Fp>\n        <div class=\"viz\">\n          <div class=\"inq-list\">\n            <div class=\"row\"><div class=\"q\">\"Are you open Easter Sunday?\"<\u002Fdiv><div class=\"a\">— 0s · resolved<\u002Fdiv><\u002Fdiv>\n            <div class=\"row\"><div class=\"q\">\"Cost per lane on Fridays?\"<\u002Fdiv><div class=\"a\">— 0s · resolved<\u002Fdiv><\u002Fdiv>\n            <div class=\"row\"><div class=\"q\">\"Do you take walk‑ins after 9?\"<\u002Fdiv><div class=\"a\">— 0s · resolved<\u002Fdiv><\u002Fdiv>\n            <div class=\"row\"><div class=\"q\">\"Is the kitchen open till close?\"<\u002Fdiv><div class=\"a\">— 0s · resolved<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= WORKFLOW / PIPELINE ========================= -->\n<section class=\"section\" id=\"workflow\" style=\"padding-top:0\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">Party workflow<\u002Fspan>\n        <h2 style=\"margin-top:14px\">A pipeline, not a sticky note.<\u002Fh2>\n      <\u002Fdiv>\n      <p>Every party lead enters a structured pipeline. Every stage has a next action. Every card shows who, when, and how much — at a glance from the floor.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"pipeline-shell\">\n      <div class=\"process\">\n        <div class=\"p-step\">\n          <div class=\"p-num\">01<\u002Fdiv>\n          <div class=\"p-name\">Inquiry<\u002Fdiv>\n          <div class=\"p-desc\">Caller asks about a party. VenueVox captures date, guest count, and package interest.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"p-arrow\">→<\u002Fdiv>\n        <div class=\"p-step\">\n          <div class=\"p-num\">02<\u002Fdiv>\n          <div class=\"p-name\">Hold<\u002Fdiv>\n          <div class=\"p-desc\">Date placed on a 24‑hour hold. Staff can review or override from the dashboard.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"p-arrow\">→<\u002Fdiv>\n        <div class=\"p-step\">\n          <div class=\"p-num\">03<\u002Fdiv>\n          <div class=\"p-name\">Deposit sent<\u002Fdiv>\n          <div class=\"p-desc\">Secure deposit link texted to caller. Timer starts. Auto follow-up armed.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"p-arrow\">→<\u002Fdiv>\n        <div class=\"p-step\">\n          <div class=\"p-num\">04<\u002Fdiv>\n          <div class=\"p-name\">Paid<\u002Fdiv>\n          <div class=\"p-desc\">Payment confirmed. Party moves from tentative to committed revenue.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"p-arrow\">→<\u002Fdiv>\n        <div class=\"p-step\">\n          <div class=\"p-num\">05<\u002Fdiv>\n          <div class=\"p-name\">Confirmed<\u002Fdiv>\n          <div class=\"p-desc\">Synced to party reservation system. GM sees it on the floor plan.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"process-note\">Every stage has a next action. Every lead has a timer. Nothing lives on a sticky note.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= DEMO / PROOF ========================= -->\n<section class=\"section light\" id=\"demo\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">Hear it sell<\u002Fspan>\n        <h2 style=\"margin-top:14px\">Call the demo line.<br>Hear VenueVox close a party.<\u002Fh2>\n      <\u002Fdiv>\n      <p>This is a prototype line modeled on a real bowling-and-arcade venue using public information. Hear how VenueVox handles a party inquiry, announces a promo, and moves the caller toward a deposit.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"demo-grid\">\n      <!-- Player -->\n      <div class=\"player\">\n        <div class=\"meta-row\">\n          <span>Prototype demo · Party inquiry<\u002Fspan>\n          <span class=\"num\">00:42 / 02:18<\u002Fspan>\n        <\u002Fdiv>\n        <h3>\"I'm planning my daughter's 10th birthday — do you have space Saturday?\"<\u002Fh3>\n\n        <div class=\"controls\">\n          <button class=\"play-btn\" id=\"playBtn\" aria-label=\"Play demo\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 14 14\" fill=\"currentColor\"><path d=\"M3 2 L11 7 L3 12 Z\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n          <div class=\"wave-static\" id=\"wave\"><\u002Fdiv>\n          <div class=\"time num\" id=\"timeLabel\">00:42<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:8px     Tweaks\n    <button onclick=\"hideTweaks()\" title=\"Close\">×<\u002Fbutton>\n  <\u002Fh5>\n\n  <div class=\"group\">\n    <label>Theme<\u002Flabel>\n    <div class=\"opts\" data-key=\"theme\">\n      <button data-v=\"night\" class=\"on\">Midnight<\u002Fbutton>\n      <button data-v=\"day\">Daylight<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"group\">\n    <label>Accent<\u002Flabel>\n    <div class=\"swatch\" data-key=\"accent\">\n      <button data-v=\"teal\" class=\"on\" style=\"background:#19B3A6\" title=\"Signal Teal\"><\u002Fbutton>\n      <button data-v=\"brass\" style=\"background:#C79A4B\" title=\"Venue Brass\"><\u002Fbutton>\n      <button data-v=\"emerald\" style=\"background:#10B981\" title=\"Emerald\"><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"group\">\n    <label>Hero headline<\u002Flabel>\n    <div class=\"opts\" data-key=\"headline\" style=\"flex-direction:column\">\n      <button data-v=\"a\" class=\"on\">Your phone gets answered. But is it selling?<\u002Fbutton>\n      <button data-v=\"b\">1 in 5 callers hear the promo. Fix that.<\u002Fbutton>\n      <button data-v=\"c\">Every call sells.<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"group\">\n    <label>Hero visual<\u002Flabel>\n    <div class=\"opts\" data-key=\"hero\">\n      <button data-v=\"console\" class=\"on\">Live console<\u002Fbutton>\n      <button data-v=\"minimal\">Minimal<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ===== Demo wave rendering (static bars) =====\n(function(){\n  const w = document.getElementById('wave');\n  if(!w) return;\n  const N = 72;\n  const heights = [];\n  for(let i=0;i<N;i++){\n    const x = i/N;\n    const h = 6 + Math.round(Math.abs(Math.sin(x*9)) * 16 + Math.abs(Math.cos(x*3))*4);\n    heights.push(h);\n  }\n  w.innerHTML = heights.map((h,i)=>{\n    const played = i/N < 0.34;\n    return `<span style=\"height:${h}px; background:${played ? '#0F1B2D' : 'rgba(15,27,45,.25)'}\"><\u002Fspan>`;\n  }).join('');\n})();\n\n// ===== Play button simulation =====\n(function(){\n  const btn = document.getElementById('playBtn');\n  const time = document.getElementById('timeLabel');\n  if(!btn) return;\n  let playing = false, t = 42, iv;\n  btn.addEventListener('click', ()=>{\n    playing = !playing;\n    btn.innerHTML = playing\n      ? '<svg width=\"18\" height=\"18\" viewBox=\"0 0 14 14\" fill=\"currentColor\"><rect x=\"3\" y=\"2\" width=\"3\" height=\"10\"/><rect x=\"8\" y=\"2\" width=\"3\" height=\"10\"/><\u002Fsvg>'\n      : '<svg width=\"18\" height=\"18\" viewBox=\"0 0 14 14\" fill=\"currentColor\"><path d=\"M3 2 L11 7 L3 12 Z\"/><\u002Fsvg>';\n    if(playing){\n      iv = setInterval(()=>{\n        t++;\n        if(t>=138){t=42; playing=false; clearInterval(iv); btn.click();}\n        const m = String(Math.floor(t/60)).padStart(2,'0');\n        const s = String(t%60).padStart(2,'0');\n        time.textContent = `${m}:${s}`;\n      }, 1000);\n    } else {\n      clearInterval(iv);\n    }\n  });\n})();\n\n// ===== Tweaks =====\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"theme\": \"day\",\n  \"accent\": \"teal\",\n  \"headline\": \"a\",\n  \"hero\": \"minimal\"\n}/*EDITMODE-END*/;\n\nlet state = Object.assign({}, TWEAK_DEFAULTS);\n\nfunction applyTweaks(){\n  // theme\n  document.body.classList.toggle('theme-day', state.theme === 'day');\n  // accent\n  document.body.classList.remove('accent-brass','accent-emerald');\n  if(state.accent === 'brass') document.body.classList.add('accent-brass');\n  if(state.accent === 'emerald') document.body.classList.add('accent-emerald');\n  // headline\n  const h1 = document.querySelector('.hero h1');\n  if(h1){\n    if(state.headline === 'a') h1.innerHTML = 'Your phone gets answered.<br/><em>But is it selling?<\u002Fem>';\n    if(state.headline === 'b') h1.innerHTML = '1 in 5 callers hear the promo.<br/><em>Fix that.<\u002Fem>';\n    if(state.headline === 'c') h1.innerHTML = '<em>Every call sells.<\u002Fem>';\n  }\n  // hero visual\n  const chip = document.querySelector('.float-chip');\n  const transcript = document.querySelector('.hero .transcript');\n  if(chip && transcript){\n    if(state.hero === 'minimal'){\n      chip.style.display = 'none';\n      transcript.style.display = 'none';\n    } else {\n      chip.style.display = '';\n      transcript.style.display = '';\n    }\n  }\n  // refresh button highlights\n  document.querySelectorAll('.tweaks [data-key]').forEach(g=>{\n    const k = g.dataset.key;\n    g.querySelectorAll('button').forEach(b=> b.classList.toggle('on', b.dataset.v === state[k]));\n  });\n}\n\ndocument.querySelectorAll('.tweaks [data-key]').forEach(g=>{\n  const k = g.dataset.key;\n  g.querySelectorAll('button').forEach(b=>{\n    b.addEventListener('click', ()=>{\n      state[k] = b.dataset.v;\n      applyTweaks();\n      try{\n        window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]: state[k]}}, '*');\n      }catch(e){}\n    });\n  });\n});\n\nfunction showTweaks(){ document.getElementById('tweaks').classList.add('on'); }\nfunction hideTweaks(){ document.getElementById('tweaks').classList.remove('on'); }\n\nwindow.addEventListener('message', (e)=>{\n  const d = e.data || {};\n  if(d.type === '__activate_edit_mode') showTweaks();\n  if(d.type === '__deactivate_edit_mode') hideTweaks();\n});\ntry{\n  window.parent.postMessage({type:'__edit_mode_available'}, '*');\n}catch(e){}\n\napplyTweaks();\n\n// Theme toggle in nav\nconst themeToggleBtn = document.getElementById('themeToggle');\nif(themeToggleBtn){\n  themeToggleBtn.addEventListener('click', ()=>{\n    state.theme = state.theme === 'day' ? 'night' : 'day';\n    applyTweaks();\n    try{\n      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{theme: state.theme}}, '*');\n    }catch(e){}\n  });\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
